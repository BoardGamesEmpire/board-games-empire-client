name: web_network
description: "Web-specific network implementations and overrides"
version: 1.0.0
publish_to: none

environment:
  sdk: ">=3.9.0 <4.0.0"
  flutter: ">=3.0.0"
resolution: workspace

dependencies:
  flutter:
    sdk: flutter

  network_interface:
    path: ../network_interface
  models:
    path: ../../core/models
  di:
    path: ../../core/di
  interfaces:
    path: ../../core/interfaces
  observability:
    path: ../../core/observability
  dio_network:
    path: ../dio_network

  # Base networking (inherits from dio_network)
  dio: ^5.9.2
  web_socket_channel: ^3.0.3

  http_status: ^3.3.3

  # Web-specific networking
  # dart:html is automatically available on web

  # DI
  get_it: ^9.2.1
  injectable: ^2.4.2

dev_dependencies:
  build_runner: ^2.4.12
  injectable_generator: ^2.6.1
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.5
  very_good_analysis: ^10.2.0
  flutter_lints: ^6.0.0
