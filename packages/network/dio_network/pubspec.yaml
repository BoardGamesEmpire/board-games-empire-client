name: dio_network
description: "Universal HTTP implementation with Dio"
version: 1.0.0
publish_to: none

environment:
  sdk: ">=3.9.0 <4.0.0"
  flutter: ">=3.0.0"
resolution: workspace

dependencies:
  flutter:
    sdk: flutter

  network_interface:
    path: ../network_interface
  models:
    path: ../../core/models
  di:
    path: ../../core/di
  interfaces:
    path: ../../core/interfaces
  observability:
    path: ../../core/observability

  dio: ^5.9.2
  web_socket_channel: ^3.0.3
  oauth2: ^2.0.2
  flutter_secure_storage: ^10.0.0
  retry: ^3.1.2

  get_it: ^9.2.1
  injectable: ^2.4.2

  http_status: ^3.3.3

dev_dependencies:
  build_runner: ^2.4.12
  injectable_generator: ^2.6.1
  flutter_test:
    sdk: flutter
  logging: ^1.3.0
  mocktail: ^1.0.5
  very_good_analysis: ^10.2.0
  flutter_lints: ^6.0.0

flutter:
