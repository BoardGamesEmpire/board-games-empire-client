name: desktop_platform
description: "Desktop-specific implementations and features"
version: 1.0.0
publish_to: none

environment:
  sdk: ">=3.9.0 <4.0.0"
  flutter: ">=3.0.0"
resolution: workspace

dependencies:
  flutter:
    sdk: flutter

  app_shell:
    path: ../../app_shell
  native_platform:
    path: ../native_platform

  interfaces:
    path: ../../core/interfaces
  models:
    path: ../../core/models
  di:
    path: ../../core/di

  # Desktop-specific
  window_manager: ^0.5.1           # Window management
  tray_manager: ^0.5.2             # System tray
  connectivity_plus: ^7.1.1        # Desktop connectivity

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.2.0
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
