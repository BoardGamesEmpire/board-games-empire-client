name: web_platform
description: "Web-specific implementations and features"
version: 1.0.0
publish_to: none

environment:
  sdk: ">=3.9.0 <4.0.0"
  flutter: ">=3.0.0"
resolution: workspace

dependencies:
  flutter:
    sdk: flutter

  app_shell:
    path: ../../app_shell

  interfaces:
    path: ../../core/interfaces
  models:
    path: ../../core/models
  di:
    path: ../../core/di
  observability:
    path: ../../core/observability
  connectivity_platform:
    path: ../connectivity_platform

  # Web-specific
  url_strategy: ^0.3.0
  hydrated_bloc: ^11.0.0

  # Client version (BuildInfo, #35). package_info_plus is wasm-safe
  # (js_interop) and reads Flutter's generated version.json on web,
  # which derives from the app pubspec `version:` — the same source of
  # truth as the native manifests.
  package_info_plus: ^10.2.0

dev_dependencies:
  network_interface:
    path: ../../network/network_interface
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.2.0
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
