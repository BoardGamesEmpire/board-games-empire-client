name: web_platform
description: "Web-specific implementations and features"
version: 1.0.0
publish_to: none

environment:
  sdk: ">=3.9.0 <4.0.0"
  flutter: ">=3.0.0"
resolution: workspace

dependencies:
  flutter:
    sdk: flutter

  app_shell:
    path: ../../app_shell

  interfaces:
    path: ../../core/interfaces
  models:
    path: ../../core/models
  di:
    path: ../../core/di
  observability:
    path: ../../core/observability
  connectivity_platform:
    path: ../connectivity_platform
  web_network:
    path: ../../network/web_network

  # Web-specific
  url_strategy: ^0.3.0
  hydrated_bloc: ^11.0.0
  package_info_plus: ^10.2.0

dev_dependencies:
  network_interface:
    path: ../../network/network_interface
  auth:
    path: ../../features/auth
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.2.0
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
