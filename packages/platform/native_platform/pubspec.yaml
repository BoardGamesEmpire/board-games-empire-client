name: native_platform
description: "Shared native (mobile + desktop) composition root: MetaDB, orchestrator, installers"
version: 0.0.1
publish_to: none

environment:
  sdk: ">=3.9.0 <4.0.0"
  flutter: ">=3.0.0"
resolution: workspace

dependencies:
  flutter:
    sdk: flutter

  app_shell:
    path: ../../app_shell
  interfaces:
    path: ../../core/interfaces
  models:
    path: ../../core/models
  di:
    path: ../../core/di
  storage_interface:
    path: ../../storage/storage_interface
  drift_storage:
    path: ../../storage/drift_storage
  key_storage:
    path: ../../storage/key_storage
  dio_network:
    path: ../../network/dio_network

  drift: ^2.28.2
  flutter_secure_storage: ^10.3.1
  hydrated_bloc: ^11.0.0
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.5
  flutter_lints: ^6.0.0
  very_good_analysis: ^10.2.0

flutter:
  uses-material-design: true
