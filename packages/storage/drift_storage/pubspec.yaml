name: drift_storage
description: "SQLite storage for mobile and desktop"
version: 1.0.0
publish_to: none

environment:
  sdk: ">=3.9.0 <4.0.0"
  flutter: ">=1.17.0"
resolution: workspace

dependencies:
  flutter:
    sdk: flutter

  storage_interface:
    path: ../storage_interface
  models:
    path: ../../core/models
  di:
    path: ../../core/di
  interfaces:
    path: ../../core/interfaces

  drift: ^2.18.0
  path_provider: ^2.1.3
  path: ^1.9.0

  cuid2: ^4.1.0

  get_it: ^7.7.0
  injectable: ^2.4.2

dev_dependencies:
  build_runner: ^2.4.12
  drift_dev: ^2.18.0
  injectable_generator: ^2.6.1
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.2.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec
