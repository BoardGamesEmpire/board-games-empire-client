name: server_onboarding
description: "Server onboarding feature (#36) — discovery, negotiation, persist, activate"
publish_to: none

environment:
  sdk: ">=3.9.0 <4.0.0"
  flutter: ">=3.0.0"
resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  interfaces:
    path: ../../core/interfaces
  models:
    path: ../../core/models
  network_interface:
    path: ../../network/network_interface
  observability:
    path: ../../core/observability

  flutter_bloc: ^9.1.1
  equatable: ^2.0.6
  reactive_forms: ^18.1.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^10.0.0
  mocktail: ^1.0.5
  very_good_analysis: ^10.2.0
  flutter_lints: ^6.0.0
  l10n_test_support:
    path: ../../testing/l10n

flutter:
  generate: true
  uses-material-design: true
