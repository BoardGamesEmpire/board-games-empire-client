name: auth
description: "Authentication feature — Bloc, states, and events"
publish_to: none

environment:
  sdk: ">=3.9.0 <4.0.0"
  flutter: ">=3.0.0"
resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  interfaces:
    path: ../../core/interfaces
  models:
    path: ../../core/models
  observability:
    path: ../../core/observability
  ui:
    path: ../../ui

  flutter_bloc: ^9.1.1
  equatable: ^2.0.6
  flutter_form_builder: ^10.3.0
  form_builder_validators: ^11.3.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^10.0.0
  mocktail: ^1.0.5
  very_good_analysis: ^10.2.0
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
