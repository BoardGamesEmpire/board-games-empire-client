name: feedback
description: "User-initiated feedback feature — compose form for bug / feature-request reports (#107)"
publish_to: none

environment:
  sdk: ">=3.9.0 <4.0.0"
  flutter: ">=3.0.0"
resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  observability:
    path: ../../core/observability

  reactive_forms: ^18.1.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  very_good_analysis: ^10.2.0
  l10n_test_support:
    path: ../../testing/l10n

flutter:
  generate: true
  uses-material-design: true
