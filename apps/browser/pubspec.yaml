name: browser
description: "Board Games Empire web frontend"
publish_to: none

version: 1.0.0+1

environment:
  sdk: ">=3.9.0 <4.0.0"
resolution: workspace

# Apps are thin wrappers: all composition lives in the platform package
# (which owns the concrete network dependencies) and the shared shell.
# Web is storage-less for the alpha (single server = the serving origin);
# the web data layer (drift/wasm via web_storage) is designed in #63 and
# re-adds its dependency through web_platform when it lands.
dependencies:
  flutter:
    sdk: flutter

  app_shell:
    path: ../../packages/app_shell
  web_platform:
    path: ../../packages/platform/web

  cupertino_icons: ^1.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
