name: mobile
description: "Board Games Empire mobile application"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.9.0 <4.0.0"
resolution: workspace

# Apps are thin wrappers: all composition lives in the platform package
# (which owns the concrete storage/network dependencies) and the shared
# shell. Do not add feature or infrastructure dependencies here.
dependencies:
  flutter:
    sdk: flutter

  app_shell:
    path: ../../packages/app_shell
  mobile_platform:
    path: ../../packages/platform/mobile

  cupertino_icons: ^1.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
