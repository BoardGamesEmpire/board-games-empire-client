name: CI

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Pin Flutter once for the whole workflow. Bump here to move every job.
# Pinning (rather than tracking `stable`) keeps codegen, analysis, and
# tests deterministic across runs. Goldens (#32) run local-only (see the
# `test` job), so on a bump also regenerate them locally
# (`melos run goldens:update`) and commit the refreshed `goldens/ci/`
# PNGs in the same PR.
env:
  FLUTTER_VERSION: 3.44.4

jobs:
  # ── Codegen (fresh, once) + schema freshness ────────────────────
  # Generated code (.g.dart / .freezed.dart / .config.dart, and the
  # gen-l10n localizations per #33) is gitignored, so every job that
  # compiles or analyses Dart needs it produced first. Rather than
  # regenerate in each job, this single job generates once, verifies it,
  # and publishes the output as an artifact that `analyze` and `test`
  # restore. That keeps generation fresh on every run with no
  # committed/stale artifacts.
  #
  # Staging (#33): gen-l10n runs FIRST — the generated localizations must
  # exist before the build_runner pass, mirroring the local
  # `melos run generate` pipeline (generate:i18n → generate:build). Each
  # package that owns an l10n.yaml gets its own `flutter gen-l10n` run
  # (the synthetic package is gone; output is real source per package).
  #
  # Codegen then runs as a single workspace-wide build_runner pass at the
  # repo root (--workspace): the builder is AOT-compiled once instead
  # of once per package, packages build in parallel internally, and the
  # build cache lands in a single root .dart_tool/build. No melos here.
  #
  # Two gates:
  #   1. Codegen must complete with no errors.
  #   2. A fresh `schema dump` must byte-match the committed snapshots.
  generate:
    name: Codegen + schema freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      # Restore build_runner's incremental state (asset graph + cached
      # outputs) so unchanged sources skip regeneration. The lockfile
      # hash scopes the cache to a dependency set; the SHA suffix makes
      # each run save a fresh entry, and restore-keys prefix-match the
      # most recent prior cache. A dep change (new lockfile) misses and
      # forces a correct full rebuild.
      - name: Restore build_runner cache
        uses: actions/cache@v4
        with:
          # --workspace writes a single build cache at the repo root.
          path: .dart_tool/build
          key: build-runner-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}-${{ github.sha }}
          restore-keys: |
            build-runner-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}-
            build-runner-${{ runner.os }}-
      - name: Resolve workspace
        run: flutter pub get
      - name: Generate localizations (gen-l10n stage, before build_runner)
        run: |
          set -euo pipefail
          # Null-delimited so paths with spaces are safe, and the find
          # runs OUTSIDE the loop's command substitution so a failure
          # (e.g. a missing dir) actually aborts the step instead of
          # silently yielding an empty list.
          while IFS= read -r -d '' f; do
            pkg=$(dirname "$f")
            echo "gen-l10n: $pkg"
            (cd "$pkg" && flutter gen-l10n)
          done < <(find packages apps -name l10n.yaml -not -path '*/.dart_tool/*' -print0)
      - name: Codegen must succeed (single workspace pass)
        run: flutter pub run build_runner build --workspace --delete-conflicting-outputs
      - name: Schema snapshots must be fresh
        working-directory: packages/storage/drift_storage
        run: |
          set -uo pipefail
          tmp=$(mktemp -d)
          flutter pub run drift_dev schema dump lib/src/databases/server_database.dart "$tmp/server/"
          flutter pub run drift_dev schema dump lib/src/databases/meta_database.dart   "$tmp/meta/"
          fail=0
          for db in server meta; do
            for fresh in "$tmp/$db"/drift_schema_v*.json; do
              name=$(basename "$fresh")
              committed="drift_schemas/$db/$name"
              if [ ! -f "$committed" ]; then
                echo "::error::Missing committed snapshot: $committed"
                fail=1
                continue
              fi
              if ! diff -q "$committed" "$fresh" >/dev/null; then
                echo "::error::Stale snapshot: $committed differs from a fresh dump. Run 'melos run schema:dump' and commit the result."
                diff "$committed" "$fresh" || true
                fail=1
              fi
            done
          done
          exit "$fail"
      - name: Bundle generated sources
        run: |
          find . \( -name '*.g.dart' -o -name '*.freezed.dart' \
                    -o -name '*.config.dart' -o -name '*.mocks.dart' \
                    -o -name '*_localizations*.dart' \) \
            -not -path '*/.dart_tool/*' -print0 \
            | tar --null -czf "$RUNNER_TEMP/generated.tar.gz" -T -
      - uses: actions/upload-artifact@v4
        with:
          name: generated-sources
          path: ${{ runner.temp }}/generated.tar.gz
          retention-days: 1

  # ── Static analysis ─────────────────────────────────────────────
  # One root `dart analyze .` walks every workspace member and honours
  # each package's own analysis_options.yaml. Needs generated code, so
  # it restores the artifact from `generate` first.
  analyze:
    name: Analyze
    needs: generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: generated-sources
          path: ${{ runner.temp }}
      - name: Restore generated sources
        run: tar -xzf "$RUNNER_TEMP/generated.tar.gz"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Resolve workspace
        run: flutter pub get
      - name: Analyze whole workspace
        run: dart analyze .

  # ── Discover packages that have tests ───────────────────────────
  # Builds the test matrix dynamically so new packages are picked up
  # automatically — nothing to keep in sync by hand.
  discover-tests:
    name: Discover test packages
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.find.outputs.packages }}
    steps:
      - uses: actions/checkout@v4
      - id: find
        run: |
          pkgs=$(find packages apps -type d -name test -not -path '*/.*/*' \
            | sed 's:/test$::' \
            | sort \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "packages=$pkgs" >> "$GITHUB_OUTPUT"
          echo "Discovered test packages: $pkgs"

  # ── Tests (one job per package, in parallel) ────────────────────
  # `flutter test` for every package — drift_storage's suites import
  # flutter_test, so `dart test` can't run them, and `flutter test`
  # runs pure-Dart suites cleanly too. Restores generated code first.
  # fail-fast off so one red package doesn't cancel the rest.
  #
  # Goldens (#32) are EXCLUDED here (`--exclude-tags golden`) and run
  # local-only. Alchemist's CI goldens obscure text but still rasterize
  # shapes/anti-aliasing per-platform, so a macOS-generated baseline
  # won't match a Linux runner — the version pin removes engine skew but
  # not OS skew. Restoring CI coverage means generating the committed
  # `goldens/ci/` baselines on Linux (e.g. a Docker/CI --update-goldens
  # job) and disabling the CI-golden variant locally; deferred for now.
  test:
    name: Test ${{ matrix.package }}
    needs: [generate, discover-tests]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.discover-tests.outputs.packages) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: generated-sources
          path: ${{ runner.temp }}
      - name: Restore generated sources
        run: tar -xzf "$RUNNER_TEMP/generated.tar.gz"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Resolve workspace
        run: flutter pub get
      - name: flutter test
        working-directory: ${{ matrix.package }}
        run: flutter test --exclude-tags golden --test-randomize-ordering-seed random
