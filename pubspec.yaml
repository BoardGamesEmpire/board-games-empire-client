name: board_games_empire

environment:
  sdk: ">=3.9.0 <4.0.0"

dependency_overrides:
  analyzer: 10.2.0

# Selects the SQLite3MultipleCiphers build of SQLite for the entire
# workspace (apps *and* `flutter test` runs) via the sqlite3 3.x build hook.
# This is what provides encryption-at-rest (#16): EncryptedExecutorFactory
# applies `PRAGMA key` and verifies `PRAGMA cipher` support at every open.
# With pub workspaces this must live in the root pubspec, not per-app.
hooks:
  user_defines:
    sqlite3:
      source: sqlite3mc

dev_dependencies:
  melos: ^7.5.1
  mocktail: ^1.0.5
  very_good_analysis: ^10.2.0
  build_runner: ^2.14.1

workspace:
  - apps/mobile
  - apps/desktop
  - apps/browser
  - packages/app_shell
  - packages/core/interfaces
  - packages/core/models
  - packages/core/di
  - packages/core/observability
  - packages/features/auth
  - packages/features/server_onboarding
  - packages/storage/drift_storage
  - packages/storage/key_storage
  - packages/storage/storage_interface
  - packages/storage/memory_storage
  - packages/storage/web_storage
  - packages/network/dio_network
  - packages/network/network_interface
  - packages/network/web_network
  - packages/platform/mobile
  - packages/platform/desktop
  - packages/platform/native_platform
  - packages/platform/connectivity_platform
  - packages/platform/web
  - packages/testing/l10n
  - packages/ui/tokens
  - packages/ui/widgets

melos:
  command:
    bootstrap:
      usePubspecOverrides: true

  scripts:
    # ── Staged generation (#33) ────────────────────────────────────
    # l10n FIRST: generated localizations are gitignored (regenerated,
    # never committed — no drift), and they must exist before the
    # build_runner pass per the established build ordering. A fresh
    # checkout must run `melos run generate` once before analyze/test.
    generate:
      run: melos run generate:i18n && melos run generate:build
      description: Full staged codegen — gen-l10n across i18n packages, then one workspace-wide build_runner pass.

    generate:i18n:
      run: melos exec -- flutter gen-l10n
      description: Generate localizations in every package that owns an l10n.yaml.
      packageFilters:
        fileExists: l10n.yaml

    generate:build:
      run: dart run build_runner build --workspace --delete-conflicting-outputs
      description: Run build_runner once across the entire workspace (single builder compile, parallel across packages).

    # ── Drift schema tooling (issues #52, #7) ──────────────────────
    schema:dump:
      run: melos exec -c 1 --scope="drift_storage" -- "flutter pub run drift_dev schema dump lib/src/databases/server_database.dart drift_schemas/server/ && flutter pub run drift_dev schema dump lib/src/databases/meta_database.dart drift_schemas/meta/"
      description: Refresh committed Drift schema snapshots for both databases. Run after any schema change, then commit the JSON.

    schema:migrations:
      run: melos exec -c 1 --scope="drift_storage" -- "flutter pub run drift_dev make-migrations"
      description: Generate step-by-step migration scaffolding + schema tests for all databases registered in build.yaml.

    # Analysis and testing
    analyze:
      run: melos exec -- flutter analyze .
      description: Run flutter analyze on all packages
      packageFilters:
        flutter: true

    analyze:dart:
      run: melos exec -- dart analyze .
      description: Run dart analyze on pure-Dart packages
      packageFilters:
        flutter: false

    test:
      run: melos exec -c 4 -- "flutter test --coverage --test-randomize-ordering-seed random"
      description: Run all Flutter tests in workspace
      packageFilters:
        dirExists: test

    test:core:
      run: melos exec -c 1 --scope="packages/core/*" -- "dart test"
      description: Test all core packages
      packageFilters:
        dirExists: test

    test:storage:
      run: melos exec -c 1 --scope="packages/storage/*" -- "dart test"
      description: Test all storage packages
      packageFilters:
        dirExists: test

    # ── Golden baselines (#32) ─────────────────────────────────────
    # Regenerate committed golden baselines after an *intended* visual
    # change. Runs only golden-tagged tests, in every package with a
    # test dir; packages without goldens match zero tests and no-op
    # (exit 0). Writes test/**/goldens/ci/ (committed, Ahem-rendered)
    # plus test/**/goldens/<platform>/ (gitignored) — commit only the
    # ci/ PNGs. CI never runs this; CI only compares.
    goldens:update:
      run: melos exec -c 1 -- "flutter test --update-goldens --tags golden"
      description: Regenerate golden baselines across the workspace. Commit only test/**/goldens/ci/.
      packageFilters:
        dirExists: test

    # Clean and get dependencies
    clean:
      run: melos exec -- flutter clean && melos bootstrap
      description: Clean all packages and reinstall dependencies

    clean:generated:
      run: |
        find . -name "*.g.dart" -not -path "*/.dart_tool/*" -delete
        find . -name "*.freezed.dart" -not -path "*/.dart_tool/*" -delete
        find . -name "*.config.dart" -not -path "*/.dart_tool/*" -delete
        find . -path "*/lib/l10n/*_localizations*.dart" -not -path "*/.dart_tool/*" -delete
        find . -path "*/lib/l10n/untranslated.txt" -not -path "*/.dart_tool/*" -delete
        echo "Deleted all generated files."
      description: Delete all generated .g.dart / .freezed.dart / .config.dart files and generated localizations

    # Individual app runners
    web:
      run: melos exec -c 1 --scope="browser" -- "flutter run -d web-server --web-hostname=localhost --web-port=${BGE_WEB_PORT:-5000} --no-dds"
      description: "Serve the web app on a fixed port for the dev proxy (override with BGE_WEB_PORT; open the proxy origin, not this port)."

    web:proxy:
      run: node tool/dev_proxy/dev_proxy.mjs
      description: "Run the zero-dep dev reverse proxy (open http://localhost:8080). Ports: BGE_PROXY_PORT/BGE_WEB_PORT/BGE_BACKEND_PORT."

    web:server:
      run: 'node tool/dev_proxy/dev_proxy.mjs & PROXY_PID=$!; trap "kill $PROXY_PID 2>/dev/null" EXIT INT TERM; melos run web'
      description: "Run the proxy and web dev server together in one terminal (Ctrl-C stops both). Use the separate `web` + `web:proxy` scripts if you want independent logs."

    mobile:
      run: melos exec -c 1 -- flutter run
      description: Run the mobile application (requires connected device/emulator)
      packageFilters:
        scope: "mobile"

    desktop-windows:
      run: melos exec -c 1 -- flutter run -d windows
      description: Run the desktop application on Windows
      packageFilters:
        scope: "desktop"

    desktop-macos:
      run: melos exec -c 1 -- flutter run -d macos
      description: Run the desktop application on macOS
      packageFilters:
        scope: "desktop"

    desktop-linux:
      run: melos exec -c 1 -- flutter run -d linux
      description: Run the desktop application on Linux
      packageFilters:
        scope: "desktop"

      # Build commands for CI/CD
    build-web:
      run: melos exec -c 1 -- flutter build web --release --wasm
      description: Build the web application for production
      packageFilters:
        scope: "browser"

    build-mobile-android:
      run: melos exec -c 1 -- flutter build apk --release
      description: Build Android APK
      packageFilters:
        scope: "mobile"

    build-mobile-ios:
      run: melos exec -c 1 -- flutter build ios --release --no-codesign
      description: Build iOS application (no code signing for CI)
      packageFilters:
        scope: "mobile"

    build-desktop-windows:
      run: melos exec -c 1 -- flutter build windows --release
      description: Build Windows desktop application
      packageFilters:
        scope: "desktop"

    build-desktop-macos:
      run: melos exec -c 1 -- flutter build macos --release
      description: Build macOS desktop application
      packageFilters:
        scope: "desktop"

    build-desktop-linux:
      run: melos exec -c 1 -- flutter build linux --release
      description: Build Linux desktop application
      packageFilters:
        scope: "desktop"

    # Development utilities
    devices:
      run: flutter devices
      description: List all available devices

    doctor:
      run: flutter doctor
      description: Run Flutter doctor

    # Run all apps (requires multiple terminals or background processes)
    run-all:
      run: |
        echo "Starting all applications..."
        echo "Web: http://localhost:8080"
        echo "Note: Mobile and Desktop require connected devices"
        melos run web &
        melos run mobile &
        melos run desktop &
        wait
      description: Run all applications simultaneously (experimental)

    build-all:
      run: |
        echo "Building all platforms..."
        melos run build-web
        melos run build-mobile-android
        melos run build-desktop-windows
        melos run build-desktop-macos
        melos run build-desktop-linux
      description: Build all platforms (requires appropriate OS)
